<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DO WIDGET</title>
  <style>
    html, body {
  background:
radial-gradient(
circle at top center,
rgba(167,130,255,.18),
transparent 35%
),

linear-gradient(
180deg,
#ffffff 0%,
#faf8ff 45%,
#f4efff 100%
);
    
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  height: 100%;
  color: white;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .form-box {
  background:
rgba(255,255,255,.55);

backdrop-filter:
blur(24px);

border:
1px solid rgba(255,255,255,.7);
  border-radius: 28px;

  box-shadow:
    0 0 40px rgba(128,87,255,.15),
    0 20px 60px rgba(0,0,0,.6);

  max-width: 420px;
  width: calc(100% - 32px);

  padding: 28px 22px;

  border-radius: 24px;
      
    }

.form-box::before {
  content: '';

  position: absolute;
  inset: -1px;

  border-radius: 28px;

  background:
    linear-gradient(
      135deg,
      rgba(109,61,255,.6),
      rgba(255,95,197,.3)
    );

  z-index: -1;

  filter: blur(20px);
}
    
.step-icon {
  width: 64px;
  height: 64px;

  margin: 0 auto 20px;

  border-radius: 50%;

  background:
rgba(255,255,255,.65);

backdrop-filter:
blur(20px);
  
  border: 1px solid rgba(128,87,255,.3);

  color: #b889ff;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow:
    0 0 30px rgba(128,87,255,.25);
      }
    
    h2 {
  text-align: center;
  margin: 0 0 12px;
  font-size: 30px;
  line-height: 1.1;
  font-weight: 800;
  color:#111827;
  }

h2 span{
background:
linear-gradient(
135deg,
#7c3aed,
#a855f7
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
    
    p.subtitulo {
  text-align: center;
  color: rgba(255,255,255,.7);
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 22px;
    }
    
    label {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  display: block;
  margin-top: 14px;
      
    }
    
    input {
  width: 100%;
  padding: 14px;

  background:
rgba(255,255,255,.6);

border:
1px solid rgba(124,58,237,.12);

  border-radius: 14px;

  color: white;

  margin-top: 8px;

  transition: .25s;
}

input::placeholder {
  color: rgba(255,255,255,.35);
}

input:focus {
  outline: none;

  border-color: #9f63ff;

  box-shadow:
0 0 0 4px rgba(124,58,237,.08);
  }
    
    button {
  width: 100%;

  border: none;

  border-radius: 16px;

  padding: 15px;

  color: white;

  font-weight: 700;
  font-size: 16px;

  background:
linear-gradient(
135deg,
#ffffff,
#d8c5ff,
#9f67ff
);

  box-shadow:
    0 12px 35px rgba(149,72,255,.35);

  transition: .3s;
}

button:hover {
  transform: translateY(-2px);

  box-shadow:
    0 15px 45px rgba(149,72,255,.5);
                         }

    .error-message {
      color: red;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    @media (max-width: 768px) {

  .form-box {
    width: calc(100% - 32px);
    padding: 24px 20px;
    border-radius: 22px;
  }

  .step-icon {
    width: 64px;
    height: 64px;
    margin-bottom: 18px;
  }

  h2 {
    font-size: 28px;
  }

  .subtitulo {
    font-size: 14px;
    margin-bottom: 20px;
  }

  input {
    padding: 14px;
  }

  button {
    padding: 15px;
    font-size: 16px;
  }
  }
  </style>
</head>
<body>
  <div class="form-box">
    
    <div class="step-icon">
<svg width="34" height="34" viewBox="0 0 24 24" fill="none">
  <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 1 1 7 7l-1 1"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>
  <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 1 1-7-7l1-1"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>
</svg>
    </div>
    
    <h2>
Configure seu
<span>Widget</span>
    </h2>
    <p class="subtitulo">Preencha os dados abaixo para gerar o seu widget.</p>
    <form id="widgetForm" action="#" novalidate>

      <!-- ESTE É O HIDDEN QUE VOCÊ PRECISA -->
      <input type="hidden" name="realClientId">

      
      <label>Nome ou nome do projeto</label>
      <input type="text" name="clientId" required placeholder="Ex: Helena, MarcaX" maxlength="30">
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Token de integração do Notion</label>
      <input type="text" name="token" required placeholder="ntn_000000000000..." maxlength="60">
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Link da database do Notion</label>
      <input type="text" name="databaseId" required placeholder="https://www.notion.so/..." maxlength="150">
      <div class="error-message">Este campo é obrigatório.</div>

      <button type="submit">GERAR MEU WIDGET</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('widgetForm');
const urlParams = new URLSearchParams(window.location.search);
const realClientId = urlParams.get("clientId");
form.realClientId.value = realClientId;
    const fields = form.querySelectorAll('input[name]');

    fields.forEach((field, index) => {
      field.addEventListener('input', () => {
        field.nextElementSibling.style.display = 'none';
      });
      field.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
          e.preventDefault();
          if(index + 1 < fields.length) {
            fields[index+1].focus();
          } else {
            form.requestSubmit();
          }
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // sempre evita submit padrão

      let isValid = true;
      fields.forEach((field) => {
        const value = field.value.trim();
        let customError = '';

        if (!value) {
          customError = 'Este campo é obrigatório.';
        } else if (field.name === 'token') {
          if (value.length !== 50) {
            customError = 'O token deve ter exatamente 50 caracteres.';
          } else if (!/^[a-zA-Z0-9_]+$/.test(value)) {
            customError = 'O token deve conter apenas letras, números ou _.';
          }
        } else if (field.name === 'databaseId') {
          if (value.length < 104) {
            customError = 'O link deve ter pelo menos 104 caracteres.';
          } else if (!value.startsWith('https://www.notion.so/')) {
            customError = 'O link deve começar com https://www.notion.so/';
          }
        }

        if (customError) {
          field.nextElementSibling.textContent = customError;
          field.nextElementSibling.style.display = 'block';
          isValid = false;
        } else {
          field.nextElementSibling.style.display = 'none';
        }
      });

      if (!isValid) return; // se inválido, não envia

      // se passou validação, envia via fetch
      const data = {
  clientId: form.clientId.value.trim(),   // nome do widget
  realClientId: form.realClientId.value,  // ID da allowed_clients
  token: form.token.value.trim(),
  databaseId: form.databaseId.value.trim()
};
      try {
        const response = await fetch("https://notion-feed-backend2.onrender.com/save-config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const text = await response.text();
        // backend responde com HTML que tem script → coloca na tela
        document.write(text);
      } catch (error) {
        alert("Erro ao enviar. Tente novamente.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
