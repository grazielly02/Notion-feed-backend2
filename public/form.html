<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DO WIDGET</title>
  <style>
    html, body {

background:
radial-gradient(
circle at top center,
rgba(124,58,237,.12) 0%,
transparent 30%
),

linear-gradient(
180deg,
#ffffff 0%,
#fcfbff 40%,
#f5f3ff 100%
);

font-family:'Segoe UI',sans-serif;
margin:0;
padding:0;
min-height:100vh;
    }
    
    body{
padding:24px 0 40px;
    }

    body::before{

content:'';

position:fixed;

top:-200px;
left:50%;

transform:translateX(-50%);

width:600px;
height:600px;

background:
radial-gradient(
circle,
rgba(124,58,237,.12),
transparent 70%
);

pointer-events:none;

    }

body::after{

content:'';

position:fixed;

bottom:-250px;
right:-150px;

width:500px;
height:500px;

background:
radial-gradient(
circle,
rgba(139,92,246,.12),
transparent 70%
);

pointer-events:none;

}
    
.page{

display:flex;
flex-direction:column;

align-items:center;

width:100%;

}
    
.brand{

text-align:center;

font-size:15px;

font-weight:800;

letter-spacing:2px;

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:24px;

}
    
.form-box{
  
box-sizing:border-box;
  
position:relative;

background:
rgba(255,255,255,.82);

backdrop-filter:blur(28px);

border:
1px solid rgba(255,255,255,.9);

border-radius:28px;

max-width:500px;
width:calc(100% - 40px);
height:auto;

padding:32px 28px;

box-shadow:

0 30px 80px rgba(124,58,237,.12),

0 8px 30px rgba(15,23,42,.05);

}

.step-icon{

width:54px;
height:54px;

margin:0 auto 12px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

box-shadow:
0 18px 40px rgba(124,58,237,.28);

}
    
    h2 {
  text-align: center;
  margin: 0 0 8px;
  font-size: 42px;
  line-height: 1.05;
  font-weight: 800;
  color:#111827;
  }

h2 span{

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}
    
.subtitulo{
color:#6b7280;
font-size:16px;
line-height:1.6;
max-width:240px;
text-align:center;
margin:0 auto 36px;
}
    
label{

color:#111827;

font-size:14px;

font-weight:600;

display:block;

margin-top:20px;

margin-bottom:10px;

      }
    
input{

width:100%;

box-sizing:border-box;

height:58px;
  line-height:58px;
  font-size:15px;

padding:0 18px 0 48px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.98),
rgba(248,245,255,.95)
);

border:1px solid rgba(139,92,246,.12);
    
backdrop-filter:blur(12px);

box-shadow:
0 8px 24px rgba(15,23,42,.04);

border-radius:20px;

transition:
border-color .25s,
box-shadow .25s,
transform .25s,
background .25s;
  
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  
  }
    
input:hover{
border-color:#c4b5fd;
  }

input::placeholder{
color:#9ca3af;
font-size:15px;
}

input:focus{
  outline:none;
  border-color:#8b5cf6;

  box-shadow:
  0 0 0 3px rgba(139,92,246,.10),
  0 8px 20px rgba(139,92,246,.08);

  transform:none;
}

.input-group{

position:relative;

margin-bottom:6px;

}

.input-icon{

position:absolute;

left:18px;
top:50%;

transform:translateY(-50%);

width:20px;
height:20px;

color:#a78bfa;
opacity:.7;

pointer-events:none;

z-index:2;

}

.input-group:focus-within .input-icon{

color:#7c3aed;
opacity:1;
transition:.25s;

}

#token{
padding-right:52px;
}
  
button{

width:100%;
height:54px;

border:none;
border-radius:20px;
  
background:
linear-gradient(
135deg,
#7c3aed 0%,
#8b5cf6 45%,
#9d5cff 100%
);

color:#fff;

font-size:16px;
font-weight:800;
margin-bottom:16px;
position:relative;
overflow:hidden;
  
letter-spacing:.6px;

box-shadow:
0 10px 24px rgba(124,58,237,.22);
transition:.25s;

cursor:pointer;

  }

button::before{

content:'';

position:absolute;

top:0;
left:0;

width:100%;
height:50%;

background:
linear-gradient(
180deg,
rgba(255,255,255,.25),
transparent
);

pointer-events:none;

}


    button::after{
content:'';

position:absolute;

top:-40%;
left:-20%;

width:40%;
height:180%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.25),
transparent
);

transform:rotate(20deg);
}
button:hover{

transform:translateY(-3px);

box-shadow:
0 20px 40px rgba(124,58,237,.35);

  }

.error-message{

display:none;

padding:8px 12px;

margin-top:8px;

border-radius:12px;

background:#fff7f7;
border:1px solid #fee2e2;
  
color:#dc2626;

font-size:12px;

font-weight:500;

}

  .badge{

display:flex;
justify-content:center;
align-items:center;
width:max-content;

padding:8px 14px;

border-radius:999px;

background: rgba(124,58,237,.12);

color:#7c3aed;

font-size:12px;

font-weight:800;

margin:0 auto 16px;

      }

.security-note{

display:flex;
align-items:center;
justify-content:center;
gap:8px;

margin-top:20px;

font-size:11.5px;
font-weight:500;

color:#9ca3af;

}

.security-note svg{

width:13px;
height:13px;
opacity:.7;

color:#9ca3af;

flex-shrink:0;

}

.security-box{

background:#f8fafc;

border:1px solid #e5e7eb;

padding:12px;

border-radius:14px;

font-size:13px;

text-align:center;

}
    
.field-tip{
display:flex;
align-items:center;
min-height:18px;
margin-top:8px;
margin-left:4px;
font-size:12px;
font-weight:500;
color:#9ca3af;
opacity:0;
transition:.25s;
}

.field-tip.success{

color:#7c3aed;

font-weight:600;

}

.field-tip.error{

color:#dc2626;

font-weight:600;

    }

.toggle-password{

position:absolute;

right:16px;
top:50%;

transform:translateY(-50%);

display:flex;
align-items:center;
justify-content:center;

width:24px;
height:24px;

padding:0;
margin:0;

background:none !important;
border:none;

box-shadow:none !important;

cursor:pointer;

color:#9ca3af;

z-index:3;

}

.toggle-password::before{
display:none !important;
content:none !important;
}

.toggle-password:hover{

color:#7c3aed;

transform:translateY(-50%);

box-shadow:none !important;

  }

.toggle-password svg{

width:20px;
height:20px;

display:block;

}
    
@media(max-width:768px){

.form-box{

width:calc(100% - 48px);

max-width:420px;

padding:28px 20px;

}

  .step-icon {

width:58px;
height:58px;

margin-bottom:12px;
}

h2{

font-size:28px;

line-height:1.1;

}

  .subtitulo {
    font-size: 14px;
    margin-bottom: 20px;
  }

input{
height:50px;
padding:0 16px 0 48px;
  }

label{
font-size:14px;
}

  button{

height:58px;

font-size:16px;

border-radius:18px;
margin-top:16px;

  }
  }
  </style>
</head>
<body>

<div class="page">
  
  <div class="form-box">
    
    <div class="step-icon">

<svg
width="22"
height="22"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<!-- Linha 1 -->
<rect x="3" y="3" width="4" height="4" rx="1"/>
<rect x="10" y="3" width="4" height="4" rx="1"/>
<rect x="17" y="3" width="4" height="4" rx="1"/>

<!-- Linha 2 -->
<rect x="3" y="10" width="4" height="4" rx="1"/>
<rect x="10" y="10" width="4" height="4" rx="1"/>
<rect x="17" y="10" width="4" height="4" rx="1"/>

<!-- Linha 3 -->
<rect x="3" y="17" width="4" height="4" rx="1"/>
<rect x="10" y="17" width="4" height="4" rx="1"/>
<rect x="17" y="17" width="4" height="4" rx="1"/>

</svg>
    </div>

    <div class="badge">
● ETAPA 2 DE 3
    </div>
    
    <h2>
Configure seu
<span>VisualFeed</span>
    </h2>
    <p class="subtitulo">Conecte sua database do Notion e mantenha seus conteúdos sempre atualizados.</p>
    <form id="widgetForm" action="#" novalidate>

      <!-- ESTE É O HIDDEN QUE VOCÊ PRECISA -->
      <input type="hidden" name="realClientId">

      
      <label>Nome do Projeto</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<circle cx="12" cy="8" r="4"/>
<path d="M5 20c1.8-3.5 4.5-5 7-5s5.2 1.5 7 5"/>

</svg>
      <input type="text" name="clientId" required placeholder="Ex: Helena Studio" maxlength="30">

      </div>
        
      <div class="error-message">⚠ Este campo é obrigatório</div>

      <label>Token do Notion</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<rect
x="5"
y="11"
width="14"
height="9"
rx="2"/>

<path d="M8 11V8a4 4 0 1 1 8 0v3"/>

</svg>
      
      <input
type="password"
id="token"
name="token"
required
placeholder="ntn_..."
maxlength="50">

<button
type="button"
class="toggle-password"
onclick="toggleToken()">

<span id="eyeOpen">

<svg
width="20"
height="20"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>

</svg>

</span>

<span
id="eyeClosed"
style="display:none">

<svg
width="20"
height="20"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.8 21.8 0 0 1 5.06-5.94"/>

<path d="M1 1l22 22"/>

<path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-4.06 4.94"/>

</svg>

</span>

</button>
     
      </div>

<div
class="field-tip"
id="tokenStatus">

</div>

<div class="error-message">
Este campo é obrigatório.
</div>

      <label>Database do Notion</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<ellipse cx="12" cy="6" rx="7" ry="3"/>

<path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/>

<path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/>

      </svg>
        
      <input type="text" name="databaseId" required placeholder="Cole o link da database" maxlength="150">
     
      </div>
      
        <div class="error-message">Este campo é obrigatório.</div>

      <button type="submit">CRIAR MEU VISUALFEED</button>

<div class="security-note">

<svg
width="14"
height="14"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>

</svg>

<span>Conexão segura com o Notion</span>

</div>
      
    </form>
  </div>

  <script>
    const form = document.getElementById('widgetForm');
const urlParams = new URLSearchParams(window.location.search);
const realClientId = urlParams.get("clientId");
form.querySelector('input[name="realClientId"]'
).value = realClientId || '';
    const fields = 
form.querySelectorAll('input[name]:not([type="hidden"])'
);

const tokenInput =
document.getElementById('token');

const tokenStatus =
document.getElementById('tokenStatus');
    
function getErrorElement(field){

if(field.name === "token"){

return field.parentElement
.nextElementSibling
.nextElementSibling;

}

return field.parentElement
.nextElementSibling;

    }
    
    fields.forEach((field, index) => {
      field.addEventListener('input', () => {
        const error =
getErrorElement(field);

error.style.display = 'none';
      });
      field.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
          e.preventDefault();
          if(index + 1 < fields.length) {
            fields[index+1].focus();
          } else {
            form.requestSubmit();
          }
        }
      });
    });

tokenInput.addEventListener('input', () => {

const value = tokenInput.value.trim();

tokenStatus.classList.remove(
'success',
'error'
);

if(!value){

tokenStatus.textContent = '';
tokenStatus.style.opacity = '0';

return;

}

tokenStatus.style.opacity = '1';

if(
!/^[a-zA-Z0-9_]+$/.test(value)
){

tokenStatus.textContent =
'Use apenas letras, números e _';

tokenStatus.classList.add('error');

return;

}

if(
!value.startsWith('ntn_')
){

tokenStatus.textContent =
'Deve começar com ntn_';

tokenStatus.classList.add('error');

return;

}

if(
value.length === 50
){

tokenStatus.textContent =
'✓ Pronto para conectar';

tokenStatus.classList.add('success');

return;

}

tokenStatus.textContent = '';
tokenStatus.style.opacity = '0';

});
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // sempre evita submit padrão

      let isValid = true;
      fields.forEach((field) => {
        const value = field.value.trim();
        let customError = '';

        if (!value) {
          customError = '⚠ Este campo é obrigatório';
        } else if (field.name === 'token') {

if (!value.startsWith('ntn_')) {

customError =
'O token deve começar com ntn_.';

} else if (value.length !== 50) {

customError =
'O token deve ter exatamente 50 caracteres.';

} else if (!/^[a-zA-Z0-9_]+$/.test(value)) {

customError =
'O token deve conter apenas letras, números ou _.';

}

} else if (field.name === 'databaseId') {

  const hasDatabaseId =
    /[a-f0-9]{32}/i.test(value);

  if (!hasDatabaseId) {
    customError =
      'Não foi possível identificar uma database do Notion nesse link.';
  }

    }
        if (customError) {
          const error =
getErrorElement(field);
error.textContent = customError;
error.style.display = 'block';
          isValid = false;
        } else {
const error =
getErrorElement(field);
error.style.display = 'none';
        }
      });

      if (!isValid) return; // se inválido, não envia

      // se passou validação, envia via fetch
      const data = {
  clientId: form.clientId.value.trim(),   // nome do widget
  realClientId: form.realClientId.value,  // ID da allowed_clients
  token: form.token.value.trim(),
  databaseId: form.databaseId.value.trim()
};
      try {
        const response = await fetch("https://notion-feed-backend2.onrender.com/save-config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const text = await response.text();
        // backend responde com HTML que tem script → coloca na tela
        document.write(text);
      } catch (error) {
        alert("Erro ao enviar. Tente novamente.");
        console.error(error);
      }
    });

    function toggleToken(){

const token =
document.getElementById('token');

const eyeOpen =
document.getElementById('eyeOpen');

const eyeClosed =
document.getElementById('eyeClosed');

if(token.type === 'password'){

token.type = 'text';

eyeOpen.style.display = 'none';

eyeClosed.style.display = 'block';

}else{

token.type = 'password';

eyeOpen.style.display = 'block';

eyeClosed.style.display = 'none';

}

    }
    
  </script>
</body>
</html>
