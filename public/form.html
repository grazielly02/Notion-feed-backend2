<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DO WIDGET</title>
  <style>
    html, body {

background:
radial-gradient(
circle at top center,
rgba(124,58,237,.12) 0%,
transparent 30%
),

linear-gradient(
180deg,
#ffffff 0%,
#fcfbff 40%,
#f5f3ff 100%
);

font-family:'Segoe UI',sans-serif;
margin:0;
padding:0;
min-height:100vh;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding:40px 0;
    }
    
.form-box{

position:relative;

background:
rgba(255,255,255,.82);

backdrop-filter:blur(28px);

border:
1px solid rgba(255,255,255,.9);

border-radius:28px;

max-width:440px;
width:calc(100% - 40px);
height:auto;

padding:36px 28px;

box-shadow:
0 20px 50px rgba(124,58,237,.12),
0 5px 20px rgba(0,0,0,.04);

}

.step-icon{

width:78px;
height:78px;

background:white;

border:
1px solid rgba(124,58,237,.15);

color:#8b5cf6;

box-shadow:
0 10px 30px rgba(124,58,237,.12);

}
    
    h2 {
  text-align: center;
  margin: 0 0 12px;
  font-size: 42px;
  line-height: 1.05;
  font-weight: 800;
  color:#111827;
  }

h2 span{

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}
    
.subtitulo{

color:#6b7280;

font-size:16px;

line-height:1.6;

margin-bottom:28px;

  }
    
label{

color:#111827;

font-size:14px;

font-weight:600;

display:block;

margin-top:16px;

margin-bottom:8px;

      }
    
input{

width:100%;

padding:16px;

background:white;

border:
1px solid #e5e7eb;

border-radius:14px;

font-size:15px;

color:#111827;

transition:.25s;

box-sizing:border-box;

}

input::placeholder{

color:#9ca3af;

}

input:focus{

outline:none;

border-color:#8b5cf6;

box-shadow:
0 0 0 4px rgba(139,92,246,.12);

}
    
button{

width:100%;

margin-top:26px;

padding:17px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:700;

color:white;

background:
linear-gradient(
135deg,
#7c3aed,
#8b5cf6
);

box-shadow:
0 12px 24px rgba(124,58,237,.25);

transition:.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 16px 30px rgba(124,58,237,.35);

}

    .error-message {
      color: red;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    @media (max-width: 768px) {

  .form-box {
    width: calc(100% - 48px);
    max-width: 340px;

    padding: 24px 20px;

    border-radius: 22px;
  }


  .step-icon {
    width: 64px;
    height: 64px;
    margin-bottom: 18px;
  }

  h2 {
    font-size: 28px;
  }

  .subtitulo {
    font-size: 14px;
    margin-bottom: 20px;
  }

  input {
    padding: 14px;
  }

  button {
    padding: 15px;
    font-size: 16px;
  }
  }
  </style>
</head>
<body>
  <div class="form-box">
    
    <div class="step-icon">
<svg width="34" height="34" viewBox="0 0 24 24" fill="none">
  <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 1 1 7 7l-1 1"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>
  <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 1 1-7-7l1-1"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>
</svg>
    </div>
    
    <h2>
Configure seu
<span>Widget</span>
    </h2>
    <p class="subtitulo">Preencha os dados abaixo para gerar o seu widget.</p>
    <form id="widgetForm" action="#" novalidate>

      <!-- ESTE É O HIDDEN QUE VOCÊ PRECISA -->
      <input type="hidden" name="realClientId">

      
      <label>Nome ou nome do projeto</label>
      <input type="text" name="clientId" required placeholder="Ex: Helena, MarcaX" maxlength="30">
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Token de integração do Notion</label>
      <input type="text" name="token" required placeholder="ntn_000000000000..." maxlength="60">
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Link da database do Notion</label>
      <input type="text" name="databaseId" required placeholder="https://www.notion.so/..." maxlength="150">
      <div class="error-message">Este campo é obrigatório.</div>

      <button type="submit">GERAR MEU WIDGET</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('widgetForm');
const urlParams = new URLSearchParams(window.location.search);
const realClientId = urlParams.get("clientId");
form.realClientId.value = realClientId;
    const fields = form.querySelectorAll('input[name]');

    fields.forEach((field, index) => {
      field.addEventListener('input', () => {
        field.nextElementSibling.style.display = 'none';
      });
      field.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
          e.preventDefault();
          if(index + 1 < fields.length) {
            fields[index+1].focus();
          } else {
            form.requestSubmit();
          }
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // sempre evita submit padrão

      let isValid = true;
      fields.forEach((field) => {
        const value = field.value.trim();
        let customError = '';

        if (!value) {
          customError = 'Este campo é obrigatório.';
        } else if (field.name === 'token') {
          if (value.length !== 50) {
            customError = 'O token deve ter exatamente 50 caracteres.';
          } else if (!/^[a-zA-Z0-9_]+$/.test(value)) {
            customError = 'O token deve conter apenas letras, números ou _.';
          }
        } else if (field.name === 'databaseId') {
          if (value.length < 104) {
            customError = 'O link deve ter pelo menos 104 caracteres.';
          } else if (!value.startsWith('https://www.notion.so/')) {
            customError = 'O link deve começar com https://www.notion.so/';
          }
        }

        if (customError) {
          field.nextElementSibling.textContent = customError;
          field.nextElementSibling.style.display = 'block';
          isValid = false;
        } else {
          field.nextElementSibling.style.display = 'none';
        }
      });

      if (!isValid) return; // se inválido, não envia

      // se passou validação, envia via fetch
      const data = {
  clientId: form.clientId.value.trim(),   // nome do widget
  realClientId: form.realClientId.value,  // ID da allowed_clients
  token: form.token.value.trim(),
  databaseId: form.databaseId.value.trim()
};
      try {
        const response = await fetch("https://notion-feed-backend2.onrender.com/save-config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const text = await response.text();
        // backend responde com HTML que tem script → coloca na tela
        document.write(text);
      } catch (error) {
        alert("Erro ao enviar. Tente novamente.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
