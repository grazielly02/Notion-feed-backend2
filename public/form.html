<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DO WIDGET</title>
  <style>
    html, body {

background:
radial-gradient(
circle at top center,
rgba(124,58,237,.12) 0%,
transparent 30%
),

linear-gradient(
180deg,
#ffffff 0%,
#fcfbff 40%,
#f5f3ff 100%
);

font-family:'Segoe UI',sans-serif;
margin:0;
padding:0;
min-height:100vh;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding:40px 0;
    }

    body::before{

content:'';

position:fixed;

top:-200px;
left:50%;

transform:translateX(-50%);

width:600px;
height:600px;

background:
radial-gradient(
circle,
rgba(124,58,237,.12),
transparent 70%
);

pointer-events:none;

    }
    
.form-box{

position:relative;

background:
rgba(255,255,255,.82);

backdrop-filter:blur(28px);

border:
1px solid rgba(255,255,255,.9);

border-radius:28px;

max-width:500px;
width:calc(100% - 32px);
height:auto;

padding:48px 36px;

box-shadow:

0 30px 80px rgba(124,58,237,.12),

0 8px 30px rgba(15,23,42,.05);

}

.step-icon{

width:42px;
height:42px;

margin:0 auto 24px;

display:flex;
align-items:center;
justify-content:center;

border-radius:50%;

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

box-shadow:
0 18px 40px rgba(124,58,237,.28);

}
    
    h2 {
  text-align: center;
  margin: 0 0 12px;
  font-size: 42px;
  line-height: 1.05;
  font-weight: 800;
  color:#111827;
  }

h2 span{

background:
linear-gradient(
135deg,
#7c3aed,
#9d5cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}
    
.subtitulo{
color:#6b7280;
font-size:16px;
line-height:1.6;
max-width:300px;
margin:0 auto 30px;
}
    
label{

color:#111827;

font-size:14px;

font-weight:600;

display:block;

margin-top:16px;

margin-bottom:8px;

      }
    
input{

width:100%;

box-sizing:border-box;

height:58px;

padding:0 18px 0 48px;

background:
rgba(255,255,255,.92);

border:
1px solid rgba(124,58,237,.08);

box-shadow:
inset 0 1px 0 rgba(255,255,255,.9),
0 4px 12px rgba(0,0,0,.03);

border-radius:18px;

  }
    
input:hover{
border-color:#c4b5fd;
  }

input::placeholder{

color:#9ca3af;

}

input:focus{

outline:none;

border-color:#8b5cf6;

box-shadow:
0 0 0 4px rgba(139,92,246,.12);

}

.input-group{

position:relative;

margin-bottom:6px;

}

.input-icon{

position:absolute;

left:18px;
top:50%;

transform:translateY(-50%);

width:18px;
height:18px;

color:#9ca3af;

pointer-events:none;

z-index:2;

}

.input-group:focus-within .input-icon{

color:#7c3aed;

transition:.25s;

}
    
button{

width:100%;
height:58px;
border:none;
    
background:
linear-gradient(
135deg,
#7c3aed,
#8b5cf6
);

color:white;

font-size:17px;

letter-spacing:.3px;

box-shadow:
0 15px 35px rgba(124,58,237,.25);

transition:.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 16px 30px rgba(124,58,237,.35);

}

    .error-message {
      color: red;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

  .badge{

display:flex;
justify-content:center;
align-items:center;
width:max-content;

padding:8px 14px;

border-radius:999px;

background:
rgba(124,58,237,.08);

color:#7c3aed;

font-size:12px;

font-weight:700;

margin:0 auto 24px;

      }

@media(max-width:768px){

.form-box{

width:calc(100% - 24px);

max-width:420px;

padding:32px 24px;

}

  .step-icon {

width:76px;
height:76px;

margin-bottom:12px;
}

h2{

font-size:32px;

line-height:1.1;

}

  .subtitulo {
    font-size: 14px;
    margin-bottom: 20px;
  }

input{
height:50px;
padding:0 16px 0 48px;
  }

label{
font-size:14px;
}

  button {
    padding: 15px;
    font-size: 16px;
  }
  }
  </style>
</head>
<body>
  <div class="form-box">
    
    <div class="step-icon">

<svg
width="36"
height="36"
viewBox="0 0 24 24"
fill="none"
stroke="white"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<circle cx="12" cy="12" r="3.2"/>

<path d="M12 2.8V4.5"/>
<path d="M12 19.5V21.2"/>

<path d="M21.2 12H19.5"/>
<path d="M4.5 12H2.8"/>

<path d="M18.5 5.5L17.2 6.8"/>
<path d="M6.8 17.2L5.5 18.5"/>

<path d="M18.5 18.5L17.2 17.2"/>
<path d="M6.8 6.8L5.5 5.5"/>

</svg>

    </div>

    <div class="badge">
● ETAPA 2 DE 3
    </div>
    
    <h2>
Configure seu
<span>Widget</span>
    </h2>
    <p class="subtitulo">Configure a integração e gere seu widget em poucos segundos.</p>
    <form id="widgetForm" action="#" novalidate>

      <!-- ESTE É O HIDDEN QUE VOCÊ PRECISA -->
      <input type="hidden" name="realClientId">

      
      <label>Nome do Widget</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<circle cx="12" cy="8" r="4"/>
<path d="M5 20c1.8-3.5 4.5-5 7-5s5.2 1.5 7 5"/>

</svg>
      <input type="text" name="clientId" required placeholder="Ex: Helena Studio" maxlength="30">

      </div>
        
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Token do Notion</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<rect
x="5"
y="11"
width="14"
height="9"
rx="2"/>

<path d="M8 11V8a4 4 0 1 1 8 0v3"/>

</svg>
      
      <input type="text" name="token" required placeholder="ntn_000000000000..." maxlength="60">
     
      </div>
      
      <div class="error-message">Este campo é obrigatório.</div>

      <label>Database do Notion</label>
      <div class="input-group">
      <svg
class="input-icon"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="1.8"
stroke-linecap="round"
stroke-linejoin="round">

<ellipse cx="12" cy="6" rx="7" ry="3"/>

<path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/>

<path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/>

      </svg>
        
      <input type="text" name="databaseId" required placeholder="https://www.notion.so/..." maxlength="150">
     
      </div>
      
        <div class="error-message">Este campo é obrigatório.</div>

      <button type="submit">GERAR MEU WIDGET</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('widgetForm');
const urlParams = new URLSearchParams(window.location.search);
const realClientId = urlParams.get("clientId");
form.realClientId.value = realClientId;
    const fields = form.querySelectorAll('input[name]');

    fields.forEach((field, index) => {
      field.addEventListener('input', () => {
        field.nextElementSibling.style.display = 'none';
      });
      field.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
          e.preventDefault();
          if(index + 1 < fields.length) {
            fields[index+1].focus();
          } else {
            form.requestSubmit();
          }
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // sempre evita submit padrão

      let isValid = true;
      fields.forEach((field) => {
        const value = field.value.trim();
        let customError = '';

        if (!value) {
          customError = 'Este campo é obrigatório.';
        } else if (field.name === 'token') {
          if (value.length !== 50) {
            customError = 'O token deve ter exatamente 50 caracteres.';
          } else if (!/^[a-zA-Z0-9_]+$/.test(value)) {
            customError = 'O token deve conter apenas letras, números ou _.';
          }
        } else if (field.name === 'databaseId') {
          if (value.length < 104) {
            customError = 'O link deve ter pelo menos 104 caracteres.';
          } else if (!value.startsWith('https://www.notion.so/')) {
            customError = 'O link deve começar com https://www.notion.so/';
          }
        }

        if (customError) {
          field.nextElementSibling.textContent = customError;
          field.nextElementSibling.style.display = 'block';
          isValid = false;
        } else {
          field.nextElementSibling.style.display = 'none';
        }
      });

      if (!isValid) return; // se inválido, não envia

      // se passou validação, envia via fetch
      const data = {
  clientId: form.clientId.value.trim(),   // nome do widget
  realClientId: form.realClientId.value,  // ID da allowed_clients
  token: form.token.value.trim(),
  databaseId: form.databaseId.value.trim()
};
      try {
        const response = await fetch("https://notion-feed-backend2.onrender.com/save-config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const text = await response.text();
        // backend responde com HTML que tem script → coloca na tela
        document.write(text);
      } catch (error) {
        alert("Erro ao enviar. Tente novamente.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
