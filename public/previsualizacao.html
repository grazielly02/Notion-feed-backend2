<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Widget Pronto</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="previsualizacao"><div class="page"><section class="success-hero">

    <div class="success-icon">✓</div>

    <h1>
        Seu <span>VisualFeed</span> está pronto
    </h1>

    <p>
        Seu widget foi configurado com sucesso. Agora basta copiá-lo para o Notion.
    </p>

</section>

<section class="preview-card">

    <div class="section-title">

        <h2>Pré-visualização</h2>

        <span>
            Veja exatamente como seu widget será exibido.
        </span>

    </div>

    <div class="widget-preview">

        <iframe
            id="previewFrame"
            loading="lazy">
        </iframe>

    </div>

    <div class="embed-area">

        <div class="embed-info">

            <h3>
                Link de incorporação
            </h3>

            <p>
                Use este endereço em qualquer bloco Embed do Notion.
            </p>

        </div>

        <div class="embed-actions">

            <input
                type="text"
                id="embedLink"
                readonly
            >

            <button id="copyBtn">
                Copiar URL
            </button>

        </div>

    </div>

</section>

</div><div id="copyToast">
✓ Link copiado
</div><script>

const params =
new URLSearchParams(window.location.search);

const clientId =
params.get("clientId") || "CLIENTE_PADRAO";

const finalLink =
`https://meu-widget-feed.netlify.app/widget/${clientId}/view`;

document.getElementById("previewFrame").src =
finalLink;

document.getElementById("embedLink").value =
finalLink;

document
.getElementById("copyBtn")
.addEventListener("click", async () => {

    await navigator.clipboard.writeText(finalLink);

    const toast =
    document.getElementById("copyToast");

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    }, 2500);

});

</script>

</body>
    
</html>
