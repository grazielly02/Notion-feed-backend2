<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Widget Pronto</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="previsualizacao"><div class="page"><section class="success-hero">

    <div class="success-icon">✓</div>
    
    <div class="success-badge">

    <span class="badge-dot"></span>

    Configuração concluída

    </div>

    <h1>
        Seu <span>VisualFeed</span> está pronto
    </h1>

    <p>
        Seu widget já está pronto para ser incorporado ao Notion.
    </p>

</section>

<section class="preview-card">

    <div class="section-title">

        <h2>Pré-visualização</h2>

    </div>

    <div class="widget-preview">

        <iframe
            id="previewFrame"
            loading="lazy">
        </iframe>

    </div>

    <div class="embed-area">

        <div class="embed-info">

            <h3>
                Link de incorporação
            </h3>

            <p>
                Cole este link em um bloco Embed do Notion.
            </p>

        </div>

        <div class="embed-actions">

            <input
                type="text"
                id="embedLink"
                readonly
            >

            <button id="copyBtn">
                Copiar link
            </button>

        </div>

    </div>

</section>

</div>
    
    <script>

const params =
new URLSearchParams(window.location.search);

const clientId =
params.get("clientId") || "CLIENTE_PADRAO";

const finalLink =
`https://meu-widget-feed.netlify.app/widget/${clientId}/view`;

document.getElementById("previewFrame").src =
finalLink;

document.getElementById("embedLink").value =
finalLink;

const copyBtn =
document.getElementById("copyBtn");

copyBtn.addEventListener("click", async () => {

    await navigator.clipboard.writeText(finalLink);

    copyBtn.classList.add("copied");

    copyBtn.innerHTML = "✓ Link copiado";

    setTimeout(() => {

        copyBtn.classList.remove("copied");

        copyBtn.innerHTML = "Copiar link";

    },2000);

});

    </script>

</body>
    
</html>
