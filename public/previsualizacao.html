<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Widget Criado</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="previsualizacao">

<div class="page">

    <div class="preview-card">

        <div class="badge">
            ✓ WIDGET CRIADO
        </div>

        <div class="preview-header">

            <h1>
                Seu <span>VisualFeed</span> está pronto
            </h1>

            <p>
                O widget foi conectado com sucesso.
                Visualize o resultado abaixo e copie seu link de incorporação.
            </p>

        </div>

        <div class="success-pill">
            ✓ Preview funcionando
        </div>

        <div class="widget-preview">

            <iframe
                id="previewFrame"
                loading="lazy">
            </iframe>

        </div>

        <div class="embed-card">

            <div class="embed-header">
                Incorporar no Notion
            </div>

            <div class="link-container">

                <input
                    type="text"
                    id="embedLink"
                    readonly
                >

                <button id="copyBtn">
                    Copiar Link
                </button>

            </div>

        </div>

    </div>

</div>

<div id="copyToast">
    ✓ Link copiado com sucesso
</div>

<script>

const params = new URLSearchParams(window.location.search);

const clientId =
params.get("clientId") || "CLIENTE_PADRAO";

const finalLink =
`https://meu-widget-feed.netlify.app/widget/${clientId}/view`;

document.getElementById("previewFrame").src =
finalLink;

document.getElementById("embedLink").value =
finalLink;

if(window.self !== window.top){

    document.querySelector(".embed-card")
    .style.display = "none";

}

document.getElementById("copyBtn")
.addEventListener("click", async () => {

    try{

        await navigator.clipboard.writeText(finalLink);

        const toast =
        document.getElementById("copyToast");

        toast.classList.add("show");

        setTimeout(() => {

            toast.classList.remove("show");

        },2500);

    }catch(err){

        console.error(err);

    }

});

</script>

</body>
</html>
