<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Widget Pronto</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="previsualizacao"><div class="page"><section class="success-hero">

    <div class="success-icon">✓</div>

    <h1>
        Widget criado com <span>sucesso</span>
    </h1>

    <p>
        Seu VisualFeed está pronto para ser incorporado.
    </p>

</section>

<section class="preview-card">

    <div class="section-title">

        <h2>Preview do seu feed</h2>

        <span>
            Veja exatamente como aparecerá para seus visitantes.
        </span>

    </div>

    <div class="widget-preview">

        <iframe
            id="previewFrame"
            loading="lazy">
        </iframe>

    </div>

</section>

<section class="embed-card">

    <h3>Incorporar no Notion</h3>

    <p>
        Copie o link abaixo e cole em um bloco Embed.
    </p>

    <input
        type="text"
        id="embedLink"
        readonly
    >

    <button id="copyBtn">

        Copiar Link

    </button>

</section>

</div><div id="copyToast">
✓ Link copiado com sucesso
</div><script>

const params =
new URLSearchParams(window.location.search);

const clientId =
params.get("clientId") || "CLIENTE_PADRAO";

const finalLink =
`https://meu-widget-feed.netlify.app/widget/${clientId}/view`;

document.getElementById("previewFrame").src =
finalLink;

document.getElementById("embedLink").value =
finalLink;

document
.getElementById("copyBtn")
.addEventListener("click", async () => {

    await navigator.clipboard.writeText(finalLink);

    const toast =
    document.getElementById("copyToast");

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    }, 2500);

});

</script>

</body>
    
</html>
