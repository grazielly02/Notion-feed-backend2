<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Gerar Link Exclusivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-hover:#5B3BF2;
  --success:#16A34A;
  --bg:#F8F9FF;
  --border:#E5E7EB;
  --text:#111827;
  --muted:#6B7280;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  background:
    radial-gradient(circle at top left,#ECE7FF 0%,transparent 35%),
    radial-gradient(circle at bottom right,#E0E7FF 0%,transparent 35%),
    var(--bg);
}

.card{

  width:100%;
  max-width:500px;

  background:#fff;

  border:1px solid var(--border);

  border-radius:28px;

  padding:42px;

  box-shadow:
  0 20px 60px rgba(109,74,255,.08);
}

.brand{

  text-align:center;

  font-size:15px;

  letter-spacing:8px;

  font-weight:800;

  color:var(--primary);

  margin-bottom:24px;
}

h1{

  text-align:center;

  font-size:38px;

  line-height:1.15;

  color:var(--text);

  margin-bottom:14px;
}

.subtitle{

  text-align:center;

  color:var(--muted);

  line-height:1.7;

  margin-bottom:32px;
}

label{

  display:block;

  font-weight:600;

  color:var(--text);

  margin-bottom:10px;
}

input{

  width:100%;

  padding:16px;

  border-radius:16px;

  border:1px solid var(--border);

  font-size:15px;

  margin-bottom:18px;

  transition:.2s;
}

input:focus{

  outline:none;

  border-color:var(--primary);
}

.primary-btn{

  width:100%;

  border:none;

  border-radius:16px;

  padding:15px;

  cursor:pointer;

  font-size:15px;

  font-weight:700;

  color:white;

  background:
  linear-gradient(
    135deg,
    #6D4AFF,
    #7B5CFF
  );

  transition:.2s;
}

.primary-btn:hover{

  transform:translateY(-1px);
}

#result{

  display:none;

  margin-top:22px;

  padding:20px;

  border-radius:18px;

  border:1px solid var(--border);

  background:#FAFAFA;
}

.success{

  color:var(--success);

  font-weight:700;

  margin-bottom:10px;
}

.link-box{

  margin:16px 0;

  padding:12px;

  border-radius:12px;

  background:#F3F4F6;

  word-break:break-all;

  font-size:14px;
}

.actions{

  display:flex;

  flex-direction:column;

  gap:12px;
}

.copy-btn{

  width:100%;

  border:none;

  border-radius:14px;

  padding:14px;

  cursor:pointer;

  font-weight:700;

  background:#111827;

  color:white;
}

.setup-btn{

  width:100%;

  border:none;

  border-radius:14px;

  padding:14px;

  cursor:pointer;

  font-weight:700;

  background:var(--success);

  color:white;
}

.error{

  color:#DC2626;

  font-weight:600;
}

.footer{

  text-align:center;

  margin-top:24px;

  font-size:12px;

  color:#9CA3AF;
}

@media(max-width:480px){

.card{
  padding:28px;
}

h1{
  font-size:30px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="brand">
VISUALFEED
</div>

<h1>
Gerar Link Exclusivo
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para liberar seu acesso.
</p>

<label for="email">
Seu e-mail
</label>

<input
type="email"
id="email"
placeholder="seuemail@exemplo.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Gerar meu link →
</button>

<div id="result"></div>

<div class="footer">
VisualFeed
</div>

</div>

<script>

async function generateLink() {

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if (!email) {

alert("Digite seu e-mail.");

return;
}

try {

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ email })
}
);

const data = await response.json();

if (!response.ok) {

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
${data.error || "Erro ao gerar link."}
</div>
`;

return;
}

resultBox.style.display="block";

resultBox.innerHTML=`

<div class="success">
✓ Link exclusivo criado com sucesso
</div>

<p>
Seu acesso foi liberado.
</p>

<div class="link-box">
${data.setupUrl}
</div>

<div class="actions">

<button
class="copy-btn"
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar Link
</button>

<button
class="setup-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar Widget →
</button>

</div>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
Erro ao conectar ao servidor.
</div>
`;

}

}

</script>

</body>
</html>
