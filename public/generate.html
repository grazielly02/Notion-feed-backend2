<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Liberar acesso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-dark:#5737e6;
  --bg:#f6f4ff;
  --text:#111827;
  --muted:#6b7280;
  --card:#ffffff;
  --border:#e5e7eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left,#ece7ff 0%,transparent 40%),
    radial-gradient(circle at bottom right,#e0e7ff 0%,transparent 35%),
    #f8fafc;
  min-height:100vh;
  padding:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrapper{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  align-items:center;
}

.left{
  max-width:520px;
}

.logo{
  font-size:15px;
  letter-spacing:8px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:24px;
}

h1{
  font-size:54px;
  line-height:1.05;
  color:var(--text);
  margin-bottom:18px;
}

.subtitle{
  font-size:18px;
  line-height:1.7;
  color:var(--muted);
  margin-bottom:28px;
}

.benefits{
  display:grid;
  gap:12px;
  margin-bottom:35px;
}

.benefit{
  display:flex;
  align-items:center;
  gap:12px;
  color:#374151;
}

.check{
  width:24px;
  height:24px;
  border-radius:50%;
  background:#ede9fe;
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.card{
  background:white;
  padding:28px;
  border-radius:24px;
  border:1px solid var(--border);
  box-shadow:0 15px 40px rgba(109,74,255,.08);
}

label{
  display:block;
  margin-bottom:10px;
  font-weight:600;
}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:15px;
  margin-bottom:16px;
}

input:focus{
  outline:none;
  border-color:var(--primary);
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
}

.primary-btn{
  background:linear-gradient(
    135deg,
    var(--primary),
    var(--primary-dark)
  );
  color:white;
}

.success-btn{
  background:#16a34a;
  color:white;
  margin-top:10px;
}

.copy-btn{
  background:#111827;
  color:white;
  margin-top:10px;
}

#result{
  display:none;
  margin-top:20px;
  padding:18px;
  border-radius:16px;
  background:#f9fafb;
  border:1px solid var(--border);
}

.success{
  color:#16a34a;
  font-weight:700;
  margin-bottom:10px;
}

.error{
  color:#dc2626;
  font-weight:600;
}

.preview{
  display:flex;
  justify-content:center;
}

.preview img{
  width:100%;
  max-width:520px;
  border-radius:28px;
  box-shadow:
    0 30px 60px rgba(0,0,0,.15);
  transform:rotate(-2deg);
}

.footer{
  margin-top:20px;
  color:#9ca3af;
  font-size:13px;
}

@media(max-width:950px){

.wrapper{
  grid-template-columns:1fr;
}

.preview{
  order:-1;
}

h1{
  font-size:38px;
}

.preview img{
  max-width:380px;
  transform:none;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="left">

<div class="logo">
VISUALFEED
</div>

<h1>
Configure seu VisualFeed em poucos minutos
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para acessar sua área de configuração e criar seu feed conectado ao Notion.
</p>

<div class="benefits">

<div class="benefit">
<div class="check">✓</div>
Atualização automática
</div>

<div class="benefit">
<div class="check">✓</div>
Compatível com Notion
</div>

<div class="benefit">
<div class="check">✓</div>
Layout responsivo
</div>

<div class="benefit">
<div class="check">✓</div>
Sem programação
</div>

</div>

<div class="card">

<label for="email">
E-mail utilizado na compra
</label>

<input
type="email"
id="email"
placeholder="seuemail@exemplo.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Liberar acesso →
</button>

<div id="result"></div>

</div>

<div class="footer">
VisualFeed • Criado por AYRA
</div>

</div>

<div class="preview">

<!-- TROQUE PELA URL DA SUA IMAGEM -->
<img
src="SEU-MOCKUP-DO-FEED.png"
alt="Preview VisualFeed"
/>

</div>

</div>

<script>

async function generateLink() {

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if (!email) {
alert("Insira seu e-mail.");
return;
}

try {

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ email })
}
);

const data = await response.json();

if(!response.ok){

resultBox.style.display="block";

resultBox.innerHTML =
`<div class="error">
${data.error || "Erro ao gerar link."}
</div>`;

return;
}

document.querySelector(".card").innerHTML = `

<div class="success">
🎉 Acesso liberado com sucesso
</div>

<p style="margin-bottom:15px;">
Seu ambiente está pronto.
</p>

<button
class="success-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar meu Widget →
</button>

<button
class="copy-btn"
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar Link
</button>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML =
`<div class="error">
Erro ao conectar ao servidor.
</div>`;

}

}

</script>

</body>
</html>
