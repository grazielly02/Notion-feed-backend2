<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Acessar configuração</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-hover:#5B3BF2;
  --bg:#F7F8FC;
  --card:#FFFFFF;
  --text:#111827;
  --muted:#6B7280;
  --border:#E5E7EB;
  --success:#16A34A;
  --error:#DC2626;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:24px;

  background:
  radial-gradient(circle at top left,#ECE7FF 0%,transparent 35%),
  radial-gradient(circle at bottom right,#E0E7FF 0%,transparent 35%),
  var(--bg);
}

.card{

  width:100%;
  max-width:460px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:24px;

  padding:42px;

  box-shadow:
  0 20px 50px rgba(109,74,255,.08);
}

.brand{

  text-align:center;

  color:var(--primary);

  font-size:15px;

  font-weight:800;

  letter-spacing:8px;

  margin-bottom:24px;
}

h1{

  font-size:34px;

  line-height:1.15;

  text-align:center;

  color:var(--text);

  margin-bottom:14px;
}

.subtitle{

  text-align:center;

  color:var(--muted);

  line-height:1.7;

  margin-bottom:32px;
}

label{

  display:block;

  font-weight:600;

  margin-bottom:10px;

  color:var(--text);
}

input{

  width:100%;

  padding:15px;

  border:1px solid var(--border);

  border-radius:14px;

  font-size:15px;

  margin-bottom:18px;

  transition:.2s;
}

input:focus{

  outline:none;

  border-color:var(--primary);
}

.primary-btn{

  width:100%;

  border:none;

  border-radius:14px;

  padding:16px;

  cursor:pointer;

  font-size:15px;

  font-weight:700;

  color:white;

  background:var(--primary);

  transition:.2s;
}

.primary-btn:hover{

  background:var(--primary-hover);
}

#result{

  display:none;

  margin-top:20px;

  padding:18px;

  border-radius:16px;

  border:1px solid var(--border);

  background:#FAFAFA;
}

.success{

  color:var(--success);

  font-weight:700;

  margin-bottom:12px;
}

.error{

  color:var(--error);

  font-weight:600;
}

.success-btn{

  width:100%;

  border:none;

  border-radius:14px;

  padding:15px;

  cursor:pointer;

  color:white;

  font-weight:700;

  background:var(--success);

  margin-top:10px;
}

.copy-link{

  text-align:center;

  margin-top:12px;

  font-size:14px;
}

.copy-link button{

  background:none;

  border:none;

  color:var(--primary);

  cursor:pointer;

  font-weight:600;
}

.footer{

  text-align:center;

  margin-top:24px;

  color:#9CA3AF;

  font-size:13px;
}

@media(max-width:480px){

  .card{
    padding:30px;
  }

  h1{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="card">

<div class="brand">
VISUALFEED
</div>

<h1>
Acesse sua área de configuração
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para continuar.
</p>

<label for="email">
E-mail
</label>

<input
type="email"
id="email"
placeholder="seuemail@exemplo.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Continuar →
</button>

<div id="result"></div>

<div class="footer">
Criado por AYRA
</div>

</div>

<script>

async function generateLink() {

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if (!email) {

alert("Insira seu e-mail.");

return;
}

try {

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ email })
}
);

const data = await response.json();

if (!response.ok) {

resultBox.style.display="block";

resultBox.innerHTML=
`<div class="error">
${data.error || "Erro ao validar acesso."}
</div>`;

return;
}

resultBox.style.display="block";

resultBox.innerHTML=`

<div class="success">
✓ Acesso validado com sucesso
</div>

<button
class="success-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar meu Widget →
</button>

<div class="copy-link">
<button
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar link manualmente
</button>
</div>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML=
`<div class="error">
Erro ao conectar ao servidor.
</div>`;

}

}

</script>

</body>
</html>
