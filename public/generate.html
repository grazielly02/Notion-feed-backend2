<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Gerar Link Exclusivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-dark:#5B38F2;
  --success:#22C55E;
  --success-dark:#16A34A;
  --bg:#F7F8FC;
  --text:#111827;
  --muted:#6B7280;
  --border:#E5E7EB;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  background:
  radial-gradient(circle at top left,#ECE8FF 0%,transparent 35%),
  radial-gradient(circle at bottom right,#EEF2FF 0%,transparent 35%),
  var(--bg);
}

.container{
  width:100%;
  max-width:760px;
}

.card{
  background:#fff;

  border-radius:32px;

  padding:48px;

  box-shadow:
  0 25px 70px rgba(0,0,0,.08);

  border:1px solid rgba(0,0,0,.04);
}

.logo{

  text-align:center;

  color:var(--primary);

  font-weight:800;

  letter-spacing:8px;

  font-size:18px;

  margin-bottom:24px;
}

.steps{
  display:flex;
  align-items:flex-start;
  justify-content:center;

  max-width:520px;

  margin:0 auto 20px;
}

  .step-item{
  display:flex;
  flex-direction:column;
  align-items:center;

  width:90px;
  }

  .step-item span{
  margin-top:12px;

  font-size:12px;
  font-weight:600;

  color:#9CA3AF;

  text-align:center;
    }

  

.step{
  width:52px;
  height:52px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  font-weight:700;

  background:#F3F4F6;
  color:#6B7280;

  z-index:2;
}

.step.active{
  background:#6D4AFF;
  color:white;
  font-weight:800;
}

.step.completed{

background:#22C55E;

color:white;

box-shadow:
0 8px 20px rgba(34,197,94,.30);

}

.step-item.completed span{
color:#16A34A;
  }
  
  .step-item.active span{
  color:#6D4AFF;
  }

.line{
  width:48px;
  height:2px;

  background:#D1D5DB;

  margin-top:26px;
}

.line.completed{

background:#DADCF0;

  }

h1{

  text-align:center;

  font-size:34px;

  line-height:1.15;

  color:var(--text);

  margin-bottom:18px;
}

.subtitle{

  text-align:center;

  color:var(--muted);

  font-size:18px;

  line-height:1.7;

  max-width:420px;

  margin:0 auto 28px;
}

label{

  display:block;

  margin-bottom:10px;

  font-weight:600;

  color:var(--text);
}

input{

  width:100%;

  height:60px;

  border-radius:16px;

  border:1px solid var(--border);

  padding:0 18px;

  font-size:16px;

  transition:.2s;

  margin-bottom:20px;
}

input:focus{

  outline:none;

  border-color:var(--primary);
}

.primary-btn{

  width:100%;

  height:60px;

  border:none;

  border-radius:16px;

  cursor:pointer;

  color:white;

  font-size:16px;

  font-weight:700;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #7C5CFF
  );

  transition:.2s;
}

.primary-btn:hover{

  transform:translateY(-1px);
}

#result{

  display:none;

  margin-top:24px;

  border:none;

  background:transparent;
}

.success-title{

text-align:center;

font-size:24px;

font-weight:800;

color:var(--text);

margin-top:6px;

margin-bottom:10px;
}

.success-subtitle{

  text-align:center;

  font-size:14px;

  line-height:1.6;

  max-width:280px;
  
  color:var(--muted);

  margin:0 auto 24px;
}

.link-label{

  font-size:14px;

  font-weight:600;

  margin-bottom:8px;
}

.link-box{

  background:#F5F3FF;

  border:1px solid #E9E2FF;

  padding:14px;

  border-radius:14px;

  font-size:14px;

  word-break:break-all;

  margin-bottom:18px;
}

.access-card{

width:100%;

max-width:400px;

margin:0 auto 16px;

background:white;

border:1px solid #ECECEC;

border-radius:18px;

padding:18px;

text-align:center;

}

.access-panel{

background:#FAFAFD;

border:1px solid #ECE8FF;

border-radius:28px;

padding:28px;

margin-top:24px;

box-shadow:
0 10px 30px rgba(109,74,255,.05);

}
  
  .access-wrapper{
  text-align:center;
  }

.access-label{

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:2px;

  color:#9CA3AF;

  margin-bottom:4px;
}

.access-id{

font-size:14px;

font-weight:800;

color:#111827;

letter-spacing:2px;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;
}
  
.copy-btn{

width:100%;

height:48px;

font-size:14px;

border:1px solid #D1D5DB;

background:white;

color:#111827;

border-radius:14px;

font-weight:700;

margin-top:12px;

transition:.2s;
}

.setup-btn{

  width:100%;
  height:54px;

  border:none;

  border-radius:16px;

  background:
  linear-gradient(
    135deg,
    #6D4AFF,
    #7C5CFF
  );

  color:white;

  font-size:15px;

  font-weight:700;

  margin-bottom:12px;

  transition:.25s;

  box-shadow:
  0 10px 24px rgba(109,74,255,.20);

  cursor:pointer;

  }

  .setup-btn:hover{

  transform:translateY(-2px);

  box-shadow:
  0 14px 30px rgba(109,74,255,.28);

    }

.notice{

  text-align:center;

  color:var(--muted);

  font-size:14px;

  line-height:1.6;
}

.error{

  color:#DC2626;

  font-weight:600;
}

.footer{

  text-align:center;

  margin-top:22px;

  color:#9CA3AF;

  font-size:13px;
}

.hero-icon{

display:flex;
justify-content:center;
align-items:center;

margin-bottom:20px;

}

.hero-icon svg{

filter:
drop-shadow(
0 12px 24px rgba(109,74,255,.20)
);

  }

.validated-email{

background:#F7FCF8;

border:1px solid #DCFCE7;

border-radius:18px;

padding:12px;

text-align:center;

margin-top:18px;

margin-bottom:24px;

box-shadow:
0 6px 18px rgba(34,197,94,.08);

  }

.validated-email-label{

font-size:14px;

font-weight:700;

color:#16A34A;

margin-bottom:6px;
}

.validated-email-value{

font-size:15px;

font-weight:600;

color:#111827;
}

.license-panel{

background:#FAFAFD;

border:1px solid #ECE8FF;

border-radius:24px;

padding:16px;

margin-top:12px;

box-shadow:
0 8px 24px rgba(109,74,255,.06);

}

@media(max-width:768px){

.card{
  padding:30px;
}

h1{
  font-size:24px;
  line-height:1.2;
  margin-bottom:16px;
}

.subtitle{
  font-size:13px;
  line-height:1.7;
  max-width:300px;
  margin:0 auto 32px;
}

.line{
  width:40px;
}

.steps{
  margin-bottom:0 auto 24px;
}

.step-item{
  width:78px;
}

.step-item span{
  font-size:11px;
}

.line{
  width:34px;
}
  
  .hero-icon{
  width="120"
  height="120"
  margin-bottom:12px;
  }

.logo{
  letter-spacing:5px;
  font-size:15px;
  margin-bottom:32px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="logo">
VISUALFEED
</div>

<div class="steps">

  <div class="step-item active" id="step1Item">

  <div class="step active" id="step1">1</div>

  <span>Verificação</span>

  </div>

  <div class="line" id="line1"></div>

  <div class="step-item" id="step2Item">

  <div class="step" id="step2">2</div>

    <span>Acesso</span>

  </div>

  <div class="line"></div>

  <div class="step-item">

    <div class="step">3</div>

    <span>Configuração</span>

  </div>

</div>

<div id="verificationSection">

<div class="hero-icon">

<svg
width="96"
height="96"
viewBox="0 0 64 64"
fill="none"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient
id="shieldGradient"
x1="0"
y1="0"
x2="64"
y2="64">

<stop offset="0%" stop-color="#7C5CFF"/>
<stop offset="100%" stop-color="#6D4AFF"/>

</linearGradient>

</defs>

<path
d="M32 6L50 13V28C50 40 42 50 32 58C22 50 14 40 14 28V13L32 6Z"
fill="url(#shieldGradient)"
/>

<path
d="M24 32L29 37L40 25"
stroke="white"
stroke-width="4"
stroke-linecap="round"
stroke-linejoin="round"
/>

</svg>

</div>

<h1>
Verifique sua compra
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para validar sua licença e liberar seu acesso exclusivo.
</p>

<label for="email">
E-mail da compra
</label>

<input
type="email"
id="email"
placeholder="seu@email.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Liberar acesso →
</button>

</div>

<div id="result"></div>

</div>

</div>

<script>

async function generateLink(){

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if(!email){

alert("Digite seu e-mail.");
return;

}

try{

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}
);

const data = await response.json();

if(!response.ok){

resultBox.style.display="block";


resultBox.innerHTML=`
<div class="error">
${data.error || "Erro ao gerar link."}
</div>
`;

return;

}

resultBox.style.display="block";

document.getElementById("verificationSection")
.style.display="none";

document.getElementById("step1")
.classList.remove("active");

document.getElementById("step1")
.classList.add("completed");

document.getElementById("step1")
.innerHTML = "✓";

document.getElementById("step1Item")
.classList.remove("active");

document.getElementById("step1Item")
.classList.add("completed");
  document.getElementById("line1")
.classList.add("completed");

document.getElementById("step2")
.classList.add("active");

document.getElementById("step2Item")
.classList.add("active");
  
resultBox.innerHTML=`

<div class="success-title">
Acesso liberado
</div>

<div class="success-subtitle">
Sua licença foi validada com sucesso. 
</div>

<div class="validated-email">

<div class="validated-email-label">
✓ Compra validada
</div>

<div class="validated-email-value">
${email}
</div>

</div>

<div class="license-panel">

<div class="access-card">

<div class="access-label">
LICENÇA VISUALFEED
</div>

<div class="access-id">
VF-${data.clientId.toUpperCase()}
</div>

</div>

<button
class="setup-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar meu widget →
</button>

<button
class="copy-btn"
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar link
</button>

</div>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
Erro ao conectar ao servidor.
</div>
`;

}

}

</script>

</body>
</html>
