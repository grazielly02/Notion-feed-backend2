<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Gerar Link Exclusivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-dark:#5B38F2;
  --success:#16A34A;
  --bg:#F7F8FC;
  --text:#111827;
  --muted:#6B7280;
  --border:#E5E7EB;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  background:
  radial-gradient(circle at top left,#ECE8FF 0%,transparent 35%),
  radial-gradient(circle at bottom right,#EEF2FF 0%,transparent 35%),
  var(--bg);
}

.container{
  width:100%;
  max-width:760px;
}

.card{
  background:#fff;

  border-radius:32px;

  padding:48px;

  box-shadow:
  0 25px 70px rgba(0,0,0,.08);

  border:1px solid rgba(0,0,0,.04);
}

.logo{

  text-align:center;

  color:var(--primary);

  font-weight:800;

  letter-spacing:8px;

  font-size:18px;

  margin-bottom:24px;
}

.steps{
  display:flex;
  align-items:flex-start;
  justify-content:center;

  max-width:520px;

  margin:0 auto 24px;
}

  .step-item{
  display:flex;
  flex-direction:column;
  align-items:center;

  width:90px;
  }

  .step-item span{
  margin-top:12px;

  font-size:12px;
  font-weight:500;

  color:#6B7280;

  text-align:center;
  }

  

.step{
  width:52px;
  height:52px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  font-weight:700;

  background:#F3F4F6;
  color:#6B7280;

  z-index:2;
}

.step.active{
  background:#6D4AFF;
  color:white;
}

.line{
  width:48px;
  height:2px;

  background:#D1D5DB;

  margin-top:26px;
}


h1{

  text-align:center;

  font-size:34px;

  line-height:1.15;

  color:var(--text);

  margin-bottom:18px;
}

.subtitle{

  text-align:center;

  color:var(--muted);

  font-size:18px;

  line-height:1.7;

  max-width:420px;

  margin:0 auto 28px;
}

label{

  display:block;

  margin-bottom:10px;

  font-weight:600;

  color:var(--text);
}

input{

  width:100%;

  height:60px;

  border-radius:16px;

  border:1px solid var(--border);

  padding:0 18px;

  font-size:16px;

  transition:.2s;

  margin-bottom:20px;
}

input:focus{

  outline:none;

  border-color:var(--primary);
}

.primary-btn{

  width:100%;

  height:60px;

  border:none;

  border-radius:16px;

  cursor:pointer;

  color:white;

  font-size:16px;

  font-weight:700;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #7C5CFF
  );

  transition:.2s;
}

.primary-btn:hover{

  transform:translateY(-1px);
}

#result{

  display:none;

  margin-top:28px;

  border:1px solid var(--border);

  border-radius:22px;

  padding:24px;

  background:#FAFAFA;
}

.success-icon{

  width:74px;
  height:74px;

  margin:0 auto 18px;

  border-radius:50%;

  background:#DCFCE7;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:34px;

  color:var(--success);
}

.success-title{

  text-align:center;

  font-size:28px;

  font-weight:800;

  color:var(--text);

  margin-bottom:10px;
}

.success-subtitle{

  text-align:center;

  color:var(--muted);

  margin-bottom:24px;
}

.link-label{

  font-size:14px;

  font-weight:600;

  margin-bottom:8px;
}

.link-box{

  background:#F5F3FF;

  border:1px solid #E9E2FF;

  padding:14px;

  border-radius:14px;

  font-size:14px;

  word-break:break-all;

  margin-bottom:18px;
}

.copy-btn{

  width:100%;

  height:54px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  color:white;

  font-weight:700;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #7C5CFF
  );

  margin-bottom:12px;
}

.setup-btn{

  width:100%;

  height:54px;

  border:1px solid #D1D5DB;

  background:white;

  border-radius:14px;

  cursor:pointer;

  font-weight:700;

  margin-bottom:18px;
}

.notice{

  text-align:center;

  color:var(--muted);

  font-size:14px;

  line-height:1.6;
}

.error{

  color:#DC2626;

  font-weight:600;
}

.footer{

  text-align:center;

  margin-top:22px;

  color:#9CA3AF;

  font-size:13px;
}

.hero-icon{

display:flex;
justify-content:center;
align-items:center;

margin-bottom:22px;

}

.hero-icon svg{

filter:
drop-shadow(
0 12px 24px rgba(109,74,255,.20)
);

  }

@media(max-width:768px){

.card{
  padding:30px;
}

h1{
  font-size:24px;
  line-height:1.2;
  margin-bottom:16px;
}

.subtitle{
  font-size:12px;
  line-height:1.7;
  max-width:300px;
  margin:0 auto 32px;
}

.line{
  width:40px;
}

.steps{
  margin-bottom:0 auto 24px;
}

.step-item{
  width:78px;
}

.step-item span{
  font-size:11px;
}

.line{
  width:34px;
}
  
  .hero-icon{
  width="120"
  height="120"
  margin-bottom:14px;
  }

.logo{
  letter-spacing:6px;
  font-size:16px;
  margin-bottom:32px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="logo">
VISUALFEED
</div>

<div class="steps">

  <div class="step-item">

    <div class="step active">1</div>

    <span>Verificação</span>

  </div>

  <div class="line"></div>

  <div class="step-item">

    <div class="step">2</div>

    <span>Acesso</span>

  </div>

  <div class="line"></div>

  <div class="step-item">

    <div class="step">3</div>

    <span>Configuração</span>

  </div>

</div>



<div class="hero-icon">

<svg
width="96"
height="96"
viewBox="0 0 64 64"
fill="none"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient
id="shieldGradient"
x1="0"
y1="0"
x2="64"
y2="64">

<stop offset="0%" stop-color="#7C5CFF"/>
<stop offset="100%" stop-color="#6D4AFF"/>

</linearGradient>

</defs>

<path
d="M32 6L50 13V28C50 40 42 50 32 58C22 50 14 40 14 28V13L32 6Z"
fill="url(#shieldGradient)"
/>

<path
d="M24 32L29 37L40 25"
stroke="white"
stroke-width="4"
stroke-linecap="round"
stroke-linejoin="round"
/>

</svg>

</div>

<h1>
Verifique sua compra
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para validar sua licença e liberar seu acesso exclusivo.
</p>

<label for="email">
E-mail da compra
</label>

<input
type="email"
id="email"
placeholder="seu@email.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Liberar acesso →
</button>

<div id="result"></div>

</div>

</div>

<script>

async function generateLink(){

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if(!email){

alert("Digite seu e-mail.");
return;

}

try{

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}
);

const data = await response.json();

if(!response.ok){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
${data.error || "Erro ao gerar link."}
</div>
`;

return;

}

resultBox.style.display="block";

resultBox.innerHTML=`

<div class="success-icon">
✓
</div>

<div class="success-title">
Link exclusivo criado
</div>

<div class="success-subtitle">
Seu acesso foi liberado com sucesso.
</div>

<div class="link-label">
Seu link exclusivo
</div>

<div class="link-box">
${data.setupUrl}
</div>

<button
class="copy-btn"
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar link
</button>

<button
class="setup-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar meu widget
</button>

<div class="notice">
Este link dá acesso ao seu painel de configuração.<br>
Guarde-o em local seguro para criar novos widgets no futuro.
</div>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
Erro ao conectar ao servidor.
</div>
`;

}

}

</script>

</body>
</html>
