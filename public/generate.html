<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisualFeed • Gerar Link Exclusivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#6D4AFF;
  --primary-dark:#5B38F2;
  --success:#16A34A;
  --bg:#F7F8FC;
  --text:#111827;
  --muted:#6B7280;
  --border:#E5E7EB;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  background:
  radial-gradient(circle at top left,#ECE8FF 0%,transparent 35%),
  radial-gradient(circle at bottom right,#EEF2FF 0%,transparent 35%),
  var(--bg);
}

.container{
  width:100%;
  max-width:760px;
}

.card{
  background:#fff;

  border-radius:32px;

  padding:48px;

  box-shadow:
  0 25px 70px rgba(0,0,0,.08);

  border:1px solid rgba(0,0,0,.04);
}

.logo{

  text-align:center;

  color:var(--primary);

  font-weight:800;

  letter-spacing:8px;

  font-size:18px;

  margin-bottom:24px;
}

.steps{

  display:flex;

  justify-content:center;

  align-items:center; 

  margin-bottom:50px;
}

.step-wrapper{

  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:90px;
}

  .step-label{

  margin-top:12px;

  font-size:12px;

  font-weight:600;

  color:#6B7280;

  text-align:center;

  white-space:nowrap;
  }
  

.step{

  width:52px;
  height:52px;
  font-size:22px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:700;

  background:#F3F4F6;

  color:#6B7280;
}

.step.active{

  background:var(--primary);

  color:white;
}

.line{

  width:95px;
  height:2px;
  background:#E5E7EB;
  margin-top:21px;
}

h1{

  text-align:center;

  font-size:42px;

  line-height:1.15;

  color:var(--text);

  margin-bottom:18px;
}

.subtitle{

  text-align:center;

  color:var(--muted);

  font-size:18px;

  line-height:1.7;

  max-width:520px;

  margin:0 auto 36px;
}

label{

  display:block;

  margin-bottom:10px;

  font-weight:600;

  color:var(--text);
}

input{

  width:100%;

  height:60px;

  border-radius:16px;

  border:1px solid var(--border);

  padding:0 18px;

  font-size:16px;

  transition:.2s;

  margin-bottom:20px;
}

input:focus{

  outline:none;

  border-color:var(--primary);
}

.primary-btn{

  width:100%;

  height:60px;

  border:none;

  border-radius:16px;

  cursor:pointer;

  color:white;

  font-size:16px;

  font-weight:700;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #7C5CFF
  );

  transition:.2s;
}

.primary-btn:hover{

  transform:translateY(-1px);
}

#result{

  display:none;

  margin-top:28px;

  border:1px solid var(--border);

  border-radius:22px;

  padding:24px;

  background:#FAFAFA;
}

.success-icon{

  width:74px;
  height:74px;

  margin:0 auto 18px;

  border-radius:50%;

  background:#DCFCE7;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:34px;

  color:var(--success);
}

.success-title{

  text-align:center;

  font-size:28px;

  font-weight:800;

  color:var(--text);

  margin-bottom:10px;
}

.success-subtitle{

  text-align:center;

  color:var(--muted);

  margin-bottom:24px;
}

.link-label{

  font-size:14px;

  font-weight:600;

  margin-bottom:8px;
}

.link-box{

  background:#F5F3FF;

  border:1px solid #E9E2FF;

  padding:14px;

  border-radius:14px;

  font-size:14px;

  word-break:break-all;

  margin-bottom:18px;
}

.copy-btn{

  width:100%;

  height:54px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  color:white;

  font-weight:700;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    #7C5CFF
  );

  margin-bottom:12px;
}

.setup-btn{

  width:100%;

  height:54px;

  border:1px solid #D1D5DB;

  background:white;

  border-radius:14px;

  cursor:pointer;

  font-weight:700;

  margin-bottom:18px;
}

.notice{

  text-align:center;

  color:var(--muted);

  font-size:14px;

  line-height:1.6;
}

.error{

  color:#DC2626;

  font-weight:600;
}

.footer{

  text-align:center;

  margin-top:22px;

  color:#9CA3AF;

  font-size:13px;
}

.hero-icon{

display:flex;
justify-content:center;
align-items:center;

margin-bottom:24px;

}

.hero-icon svg{

filter:
drop-shadow(
0 12px 24px rgba(109,74,255,.20)
);

  }

@media(max-width:768px){

.card{
  padding:30px;
}

h1{
  font-size:32px;
}

.subtitle{
  font-size:16px;
}

.line{
  width:40px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="logo">
VISUALFEED
</div>

<div class="steps">

<div class="step-wrapper">

<div class="step active">1</div>

<div class="step-label">
Verificar
</div>

</div>

<div class="line"></div>

<div class="step-wrapper">

<div class="step">2</div>

<div class="step-label">
Gerar Link
</div>

</div>

<div class="line"></div>

<div class="step-wrapper">

<div class="step">3</div>

<div class="step-label">
Configurar
</div>

</div>

</div>



<div class="hero-icon">

<svg
width="72"
height="72"
viewBox="0 0 72 72"
fill="none"
xmlns="http://www.w3.org/2000/svg">

<circle
cx="36"
cy="36"
r="36"
fill="#6D4AFF"/>

<path
d="M31 42H26C22.686 42 20 39.314 20 36C20 32.686 22.686 30 26 30H31"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

<path
d="M41 30H46C49.314 30 52 32.686 52 36C52 39.314 49.314 42 46 42H41"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

<path
d="M31 36H41"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

</svg>

</div>

<h1>
Liberar acesso
</h1>

<p class="subtitle">
Digite o e-mail utilizado na compra para liberar seu acesso ao painel de configuração.
</p>

<label for="email">
E-mail da compra
</label>

<input
type="email"
id="email"
placeholder="seu@email.com"
/>

<button
class="primary-btn"
onclick="generateLink()">
Gerar meu link →
</button>

<div id="result"></div>

<div class="footer">
VisualFeed
</div>

</div>

</div>

<script>

async function generateLink(){

const email =
document.getElementById("email")
.value
.trim();

const resultBox =
document.getElementById("result");

if(!email){

alert("Digite seu e-mail.");
return;

}

try{

const response = await fetch(
"https://notion-feed-backend2.onrender.com/generate-client",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
}
);

const data = await response.json();

if(!response.ok){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
${data.error || "Erro ao gerar link."}
</div>
`;

return;

}

resultBox.style.display="block";

resultBox.innerHTML=`

<div class="success-icon">
✓
</div>

<div class="success-title">
Link exclusivo criado
</div>

<div class="success-subtitle">
Seu acesso foi liberado com sucesso.
</div>

<div class="link-label">
Seu link exclusivo
</div>

<div class="link-box">
${data.setupUrl}
</div>

<button
class="copy-btn"
onclick="navigator.clipboard.writeText('${data.setupUrl}')">
Copiar link
</button>

<button
class="setup-btn"
onclick="window.location.href='${data.setupUrl}'">
Configurar meu widget
</button>

<div class="notice">
Este link dá acesso ao seu painel de configuração.<br>
Guarde-o em local seguro para criar novos widgets no futuro.
</div>

`;

}
catch(err){

resultBox.style.display="block";

resultBox.innerHTML=`
<div class="error">
Erro ao conectar ao servidor.
</div>
`;

}

}

</script>

</body>
</html>
